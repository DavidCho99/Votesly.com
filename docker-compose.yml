version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: bfbr-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vote
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bfbr-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
